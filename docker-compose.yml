# Dev stack. The frontend runs Vite's dev server (HMR) inside its
# container with the source bind-mounted; the backend runs mix phx.server.
# Everything is reached through the root nginx on host port 80.
#
# To run:  docker compose up
version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: outsourcing_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d outsourcing_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: ./site_backend
      dockerfile: Dockerfile.dev
    environment:
      DB_NAME: outsourcing_dev
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      JWT_SECRET: "dev_jwt_secret"
      SECRET_KEY_BASE: "dev_secret"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      PORT: 4000
      # Phoenix dev server settings
      PHX_HOST: "0.0.0.0"
      PHX_PORT: "4000"
    ports:
      # Exposed for direct dev access (curl, debugger, etc). Most
      # traffic should go through nginx on :80.
      - "4000:4000"
    depends_on:
      - db
    volumes:
      - ./site_backend:/app
      # Keep deps/build artifacts out of the host tree so the bind
      # mount doesn't see a half-overwritten _build/deps.
      - backend-deps:/app/deps
      - backend-build:/app/_build

  outsourcing_site:
    build:
      context: ./outsourcing_site
      dockerfile: Dockerfile.dev
    ports:
      # Exposed so you can hit Vite directly on the host if you want
      # to bypass nginx. The root nginx proxies to this on :5173.
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./outsourcing_site:/app
      # Anon-style: keep node_modules inside the container (host
      # platform binaries would otherwise leak in via the bind mount).
      - site-node-modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    depends_on:
      - outsourcing_site
      - backend
    # Root reverse proxy. /api/ -> backend, everything else -> Vite
    # dev server on 5173. The proxy passes websocket upgrade headers
    # so HMR keeps working.
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db-data:
  backend-deps:
  backend-build:
  site-node-modules:
