# Dev stack. The frontend runs Vite's dev server (HMR) inside its
# container with the source bind-mounted; the backend runs mix phx.server.
# Everything is reached through the root nginx on host port 80.
#
# To run:  docker compose up
version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: outsourcing_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d outsourcing_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Internal only – no host port mapping
    expose:
      - "5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: ./site_backend
      dockerfile: Dockerfile.dev
    environment:
      DB_NAME: outsourcing_dev
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      JWT_SECRET: "dev_jwt_secret"
      SECRET_KEY_BASE: "dev_secret"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMAIL_FROM: "${EMAIL_FROM:-Outsourcing Hub <onboarding@resend.dev>}"
      PORT: 4000
      PHX_HOST: "0.0.0.0"
      PHX_PORT: "4000"
    # Internal only – nginx proxies :80 → :4000 and :80/ws → :4001
    expose:
      - "4000"
      - "4001"
    depends_on:
      - db
    volumes:
      - ./site_backend:/app
      - backend-deps:/app/deps
      - backend-build:/app/_build

  outsourcing_site:
    build:
      context: ./outsourcing_site
      dockerfile: Dockerfile.dev
    # Internal only – nginx proxies / → :5173
    expose:
      - "5173"
    depends_on:
      - backend
    volumes:
      - ./outsourcing_site:/app
      - site-node-modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    depends_on:
      - outsourcing_site
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db-data:
  backend-deps:
  backend-build:
  site-node-modules:
