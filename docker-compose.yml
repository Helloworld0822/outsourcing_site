# Dev stack. The frontend runs Vite's dev server (HMR) inside its
# container with the source bind-mounted; the backend runs mix phx.server.
# Everything is reached through the root nginx on host port 82.
#
# To run:  docker compose up
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: outsourcing_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d outsourcing_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Internal only – no host port mapping
    expose:
      - "5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./site_backend
      dockerfile: Dockerfile.dev
    environment:
      DB_NAME: outsourcing_dev
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_POOL_SIZE: "10"
      DB_SSL: "false"
      DB_LOG_LEVEL: "false"
      REDIS_URL: "redis://redis:6379/0"
      FINCH_POOL_SIZE: "8"
      JWT_SECRET: "dev_jwt_secret"
      SECRET_KEY_BASE: "dev_secret"
      CORS_ALLOWED_ORIGINS: "http://localhost:82,http://localhost:5173"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMAIL_FROM: "${EMAIL_FROM:-Outsourcing Hub <onboarding@resend.dev>}"
      EMAIL_VERIFICATION_BASE_URL: "${EMAIL_VERIFICATION_BASE_URL:-http://localhost:82}"
      PORT: 4000
      PHX_HOST: "0.0.0.0"
      PHX_PORT: "4000"
      SHUTDOWN_TIMEOUT: "30000"
    # Internal only – nginx proxies :82 → :4000 and :82/ws → :4001
    expose:
      - "4000"
      - "4001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./site_backend:/app
      - backend-deps:/app/deps
      - backend-build:/app/_build
      # Persist user uploads across container recreations.
      - backend-uploads:/app/priv/static/uploads
    healthcheck:
      # The backend listens on :4000 with the API mounted at the root
      # (the `/api` prefix is added by nginx). Probe a real public route.
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:4000/projects >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  outsourcing_site:
    build:
      context: ./outsourcing_site
      dockerfile: Dockerfile.dev
    # Internal only – nginx proxies / → :5173
    expose:
      - "5173"
    depends_on:
      - backend
    volumes:
      - ./outsourcing_site:/app
      - site-node-modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_API_BASE=http://localhost:82/api
      - VITE_WS_BASE=ws://localhost:82/ws

  nginx:
    image: nginx:1.25
    ports:
      - "82:80"
    depends_on:
      - outsourcing_site
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db-data:
  backend-deps:
  backend-build:
  backend-uploads:
  redis-data:
  site-node-modules:
