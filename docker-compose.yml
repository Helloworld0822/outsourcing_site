version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: outsourcing_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d outsourcing_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"

  backend:
    build: ./site_backend
    environment:
      DB_NAME: outsourcing_dev
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      JWT_SECRET: "dev_jwt_secret"
      SECRET_KEY_BASE: "dev_secret"
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - db
    volumes:
      - ./site_backend:/app

  outsourcing_site:
    build: ./outsourcing_site
    depends_on:
      - backend

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    depends_on:
      - outsourcing_site
      - backend
    # Use the nginx config that proxies API and serves static files from the outsourced site image
    volumes:
      - ./outsourcing_site/default.conf:/etc/nginx/conf.d/default.conf:ro
    # The frontend static files are baked into the outsourcing_site image at /usr/share/nginx/html
    # No host mount for the html directory to keep container immutable

volumes:
  db-data:
