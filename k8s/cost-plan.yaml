# Crewlink Kubernetes 비용 최소화 기획
# scripts/k8s-cost-optimizer.sh 가 이 파일을 읽어 대화형으로 실행 여부를 결정합니다.

profiles:
  minimal:
    name: "최소 비용 (권장)"
    overlay: minimal
    estimated_monthly_usd: "25-60"
    description: |
      외부 관리형 DB(Neon 등) + 클러스터 내 최소 Pod.
      LoadBalancer 대신 Ingress/ClusterIP 사용.
    best_for:
      - MVP / 스테이징
      - 트래픽 적은 프로덕션
    actions:
      - overlay: minimal
      - external_db: true
      - gateway_service: ClusterIP
      - backend_replicas: 1
      - hpa_max: 2

  standard:
    name: "표준 운영"
    overlay: standard
    estimated_monthly_usd: "80-180"
    description: |
      Backend/Frontend 2 replica, HPA 최대 3.
      외부 DB 권장.
    best_for:
      - 일반 프로덕션
    actions:
      - overlay: standard
      - external_db: true
      - backend_replicas: 2
      - hpa_max: 3

  bundled-db:
    name: "올인원 (POC)"
    overlay: bundled-db
    estimated_monthly_usd: "120-250"
    description: |
      클러스터 내 Postgres StatefulSet 포함.
      PVC·백업·HA 비용이 추가되어 장기 운영 비용이 높음.
    best_for:
      - 로컬 K8s 학습 / 단기 POC
    actions:
      - overlay: bundled-db
      - external_db: false
      - backend_replicas: 1

recommendations:
  - id: use-external-db
    title: "관리형 Postgres 사용 (Neon/Cloud SQL/RDS)"
    savings: "클러스터 노드 1대 + PVC + 백업 비용 절감"
    apply_when: minimal
    manual: |
      secret.yaml 에 Neon 연결 정보 설정.
      bundled-db 오버레이는 사용하지 마세요.

  - id: clusterip-gateway
    title: "LoadBalancer → ClusterIP + Ingress"
    savings: "클라우드 LB 월 $15-30 절감"
    apply_when: minimal
    auto_patch: patch-gateway-service.yaml

  - id: shrink-redis
    title: "Redis 메모리 32MB 제한"
    savings: "메모리 요청량 감소 → 노드 축소 가능"
    apply_when: minimal
    auto_patch: patch-redis.yaml

  - id: off-hours-scale
    title: "비업무 시간 Backend 0 replica (CronJob)"
    savings: "야간/주말 compute 30-50% 절감 (트래픽 없을 때)"
    apply_when: optional
    manual: |
      kubectl apply -f k8s/extras/cron-scale-down.yaml
      주의: CronJob 적용 전 알림·캐시 TTL 확인.

  - id: spot-nodes
    title: "Spot/Preemptible 노드 풀 사용"
    savings: "compute 60-70% 절감 (단, eviction 대비 PDB 필요)"
    apply_when: optional
    manual: |
      클러스터 노드 풀을 Spot으로 생성하고
      crewlink Pod에 toleration 추가 (k8s/extras/spot-toleration.yaml 참고).

decision:
  prompt_execute: "위 기획을 클러스터에 적용하시겠습니까?"
  prompt_profile: "적용할 프로파일 번호를 선택하세요"
  default_execute: false
