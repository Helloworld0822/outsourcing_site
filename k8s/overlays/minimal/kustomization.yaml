# 비용 최소화 프로파일 (외부 DB 권장)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patch-backend-resources.yaml
  - path: patch-gateway-service.yaml
  - path: patch-hpa.yaml
  - path: patch-redis.yaml
  - path: patch-configmap.yaml

replicas:
  - name: backend
    count: 1
  - name: frontend
    count: 1
  - name: gateway
    count: 1
