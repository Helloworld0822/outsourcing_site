apiVersion: v1
kind: ConfigMap
metadata:
  name: crewlink-env
  namespace: crewlink
data:
  MIX_ENV: "prod"
  PORT: "4000"
  DB_PORT: "5432"
  DB_POOL_SIZE: "10"
  DB_SSL: "true"
  DB_LOG_LEVEL: "false"
  REDIS_URL: "redis://redis:6379/0"
  FINCH_POOL_SIZE: "4"
  SHUTDOWN_TIMEOUT: "30000"
  EMAIL_FROM: "Crewlink <no-reply@crewlink.io>"
  EMAIL_VERIFICATION_BASE_URL: "https://crewlink.example.com"
  CORS_ALLOWED_ORIGINS: "https://crewlink.example.com"
