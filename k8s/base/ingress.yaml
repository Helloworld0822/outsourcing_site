# Optional: use when your cluster has an Ingress Controller (nginx, traefik, etc.)
# instead of LoadBalancer on gateway. Uncomment in kustomization if needed.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crewlink
  namespace: crewlink
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: crewlink.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 80
