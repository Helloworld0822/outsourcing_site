# Copy to secret.yaml, fill values, then: kubectl apply -f k8s/base/secret.yaml
# NEVER commit secret.yaml. It is listed in .gitignore.
apiVersion: v1
kind: Secret
metadata:
  name: crewlink-secrets
  namespace: crewlink
type: Opaque
stringData:
  DB_NAME: "neondb"
  DB_USER: "CHANGE_ME"
  DB_PASSWORD: "CHANGE_ME"
  DB_HOST: "ep-xxx-pooler.region.aws.neon.tech"
  DB_CACERTFILE: ""
  JWT_SECRET: "CHANGE_ME"
  SECRET_KEY_BASE: "CHANGE_ME"
  OPENAI_API_KEY: ""
  RESEND_API_KEY: ""
