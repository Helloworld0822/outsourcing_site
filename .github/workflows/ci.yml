name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site_backend
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3.4"
          elixir-version: "1.18.4"
          rebar3-version: "3"

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            site_backend/deps
            site_backend/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('site_backend/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      # Tests are not currently in the repo, but the command is here for
      # the day someone adds a test suite.
      # - name: Test
      #   run: mix test

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: outsourcing_site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: outsourcing_site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_URL: ""
        run: npm run build

  deploy:
    name: Deploy
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # Frontend: Vercel auto-deploys on push via its GitHub App.
      # Backend: deploy to Fly.io using the official action.
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend
        working-directory: site_backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

  k8s-manifests:
    name: Kubernetes manifests (validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate kustomize overlays
        run: |
          for overlay in minimal standard bundled-db; do
            echo "==> k8s/overlays/$overlay"
            kubectl kustomize "k8s/overlays/$overlay" | kubectl apply --dry-run=client -f -
          done
